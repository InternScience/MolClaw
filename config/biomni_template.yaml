bench:
  enabled: true
  dataset: "molbench-ms-1"
  data_path: "bench/molbench-ms-1/molbench-ms-1.csv"
  model_name: "biomni"
  tasks: ["rdkit_bench"]
  max_process: 1

model:
  llm_model: "gpt-4o"

biomni:
  repo_path: "../../code/Biomni"
  path: "data"
  source: "Custom"
  isolate_sample_process: true
  sample_timeout_seconds: 1800
  expected_data_lake_files: []

settings:
  seed: 42
  loop_count: 1
  max_iter: 15
  enable_manual_input: 0
